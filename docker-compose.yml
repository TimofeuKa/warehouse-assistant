services:
  postgres:
    image: postgres:18-alpine
    container_name: warehouse-assistant-postgres
    environment:
      POSTGRES_DB: warehouse_assistant
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
    ports:
      - "55432:5432"
    volumes:
      - warehouse_assistant_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse -d warehouse_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  warehouse_assistant_pgdata: